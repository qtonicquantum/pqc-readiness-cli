name: cbom-validate
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  cbom-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install jsonschema cyclonedx-python-lib cryptography
      - name: Generate sample cert and inventory
        run: |
          python3 - <<'PYEOF'
          import datetime as dt
          from cryptography import x509
          from cryptography.x509.oid import NameOID
          from cryptography.hazmat.primitives import hashes, serialization
          from cryptography.hazmat.primitives.asymmetric import rsa
          key = rsa.generate_private_key(public_exponent=65537, key_size=2048)
          n = x509.Name([x509.NameAttribute(NameOID.COMMON_NAME, "ci.example")])
          cert = (x509.CertificateBuilder().subject_name(n).issuer_name(n)
                  .public_key(key.public_key()).serial_number(x509.random_serial_number())
                  .not_valid_before(dt.datetime.now(dt.timezone.utc))
                  .not_valid_after(dt.datetime.now(dt.timezone.utc) + dt.timedelta(days=30))
                  .sign(private_key=key, algorithm=hashes.SHA256()))
          with open("ci.pem","wb") as f: f.write(cert.public_bytes(serialization.Encoding.PEM))
          PYEOF
          pqc-readiness inventory --cert ci.pem --output ci.cbom.json
      - name: Validate self-emitted CBOM against CycloneDX 1.7 schema
        run: |
          python3 - <<'PYEOF'
          import json, sys
          from pathlib import Path
          import jsonschema, cyclonedx
          schema_dir = Path(cyclonedx.__file__).parent / "schema" / "_res"
          schema = json.loads(sorted(schema_dir.glob("bom-1.7*.schema.json"))[0].read_text())
          bom = json.loads(open("ci.cbom.json").read())
          if bom.get("specVersion") != "1.7":
              print(f"FAIL: specVersion={bom.get("specVersion")}, expected 1.7"); sys.exit(1)
          errs = list(jsonschema.Draft7Validator(schema).iter_errors(bom))
          if errs:
              for e in errs[:3]: print(f"FAIL: {e.message}")
              sys.exit(1)
          print("PASS: self-emitted CBOM is CycloneDX 1.7 valid")
          PYEOF
