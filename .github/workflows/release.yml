name: release
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch: {}

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build sigstore cyclonedx-bom
      - name: Build sdist + wheel
        run: python -m build
      - name: List dist contents
        run: ls -la dist/
      - name: Sign artifacts with Sigstore
        run: |
          for f in dist/*.whl dist/*.tar.gz; do
            python -m sigstore sign "$f"
          done
      - name: Generate self-CBOM (CycloneDX 1.7) — best effort
        run: |
          cyclonedx-py environment --output-format JSON --outfile dist/pqc-readiness-cli.cbom.json || \
          cyclonedx-py requirements -o dist/pqc-readiness-cli.cbom.json --output-format JSON || \
          echo "self-CBOM step failed (non-fatal); release continues"
        continue-on-error: true
      - name: Determine prerelease flag from tag
        id: prerelease
        run: |
          if [[ "${GITHUB_REF}" == *-* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*.whl
            dist/*.whl.sigstore.json
            dist/*.tar.gz
            dist/*.tar.gz.sigstore.json
            dist/pqc-readiness-cli.cbom.json
          generate_release_notes: true
          fail_on_unmatched_files: false
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
      - name: Generate build-provenance attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz
