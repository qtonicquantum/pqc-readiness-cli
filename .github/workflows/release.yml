name: release

on:
  push:
    tags: ["v*"]


permissions:
  contents: write
  id-token: write
  attestations: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - run: pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
      # Placeholder for PyPI publish — configure trusted publishing before enabling.
      # - uses: pypa/gh-action-pypi-publish@release/v1
