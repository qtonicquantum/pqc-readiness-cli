# Manual-dispatch only. mutmut 3.x has stability issues in hosted-runner
# environments (filesystem-walking edge cases); avoid pretending we have
# automated weekly mutation testing until that is reliable.
#
# To run: gh workflow run mutmut-cron.yml --repo qtonicquantum/pqc-readiness-cli
name: mutmut-manual
on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  mutate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]" "mutmut>=3.0,<4.0"
      - name: Run mutation testing on src/pqc_readiness/analysis
        working-directory: src/pqc_readiness/analysis
        run: |
          mutmut run --max-children 4 || true
          mutmut results | tee mutmut-results.log
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutmut-results
          path: src/pqc_readiness/analysis/mutmut-results.log
