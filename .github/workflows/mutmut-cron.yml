name: mutmut-cron
on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  mutate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]" "mutmut>=3.0,<4.0"
      - name: Run mutation testing
        run: mutmut run
      - name: Show results
        if: always()
        run: |
          mutmut results | tee mutmut-results.log
          mutmut stats >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
      - name: Upload mutmut DB + results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutmut-results
          path: |
            mutmut-results.log
            .mutmut-cache
            mutants/
