name: mutmut-cron
on:
  schedule:
    - cron: "0 6 * * 1"   # weekly Monday 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  mutate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]" mutmut
      - name: Run mutation testing
        run: |
          mutmut run --paths-to-mutate src/pqc_readiness --runner "python -m pytest -q -x" --simple-output 2>&1 | tee mutmut.log || true
          mutmut results 2>&1 | tee mutmut-results.log
        continue-on-error: true
      - name: Summary
        run: |
          echo "## Mutation testing results" >> $GITHUB_STEP_SUMMARY
          tail -n 50 mutmut-results.log >> $GITHUB_STEP_SUMMARY
        if: always()
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mutmut-results
          path: |
            mutmut.log
            mutmut-results.log
